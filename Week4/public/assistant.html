<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant — Ledger</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
 
<header class="topbar">
    <div class="brand"><span class="mark">₹</span> Ledger</div>
    <button class="nav-toggle" aria-label="Toggle menu">☰</button>
    <nav class="navlinks">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="add-transaction.html">Add Transaction</a>
        <a href="history.html">History</a>
        <a href="reports.html">Reports</a>
        <a href="assistant.html">AI Assistant</a>
        <a href="settings.html">Settings</a>
    </nav>
</header>
 
<main>
    <span class="eyebrow">Ask Anything</span>
    <h1 class="page-title">AI Assistant</h1>
    <p class="page-sub">Ask a finance question. It knows your current balance and spending.</p>
 
    <div class="ledger" style="max-width:640px;">
        <div class="chat-window" id="chatWindow">
            <div class="msg ai">Hi! I can see your ledger — ask me anything about your money, budgeting, or saving tips.</div>
        </div>
        <form class="chat-input-row" id="chatForm">
            <input type="text" id="chatInput" placeholder="e.g. How can I save more this month?" required autocomplete="off">
            <button type="submit" class="btn btn-primary">Send</button>
        </form>
    </div>
</main>
 
<footer>Ledger · Finance Tracker</footer>
 
<script src="js/storage.js"></script>
<script src="js/ai.js"></script>
<script src="js/nav.js"></script>
<script>
    const chatWindow = document.getElementById("chatWindow");
    const chatForm = document.getElementById("chatForm");
    const chatInput = document.getElementById("chatInput");
 
    function addMessage(text, sender) {
        const div = document.createElement("div");
        div.className = "msg " + sender;
        div.textContent = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return div;
    }
 
    chatForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        const question = chatInput.value.trim();
        if (!question) return;
 
        addMessage(question, "user");
        chatInput.value = "";
        chatInput.disabled = true;
 
        const loadingMsg = addMessage("Thinking...", "ai");
 
        const balance = getBalance();
        const income = getTotalIncome();
        const expense = getTotalExpenses();
        const catTotals = getCategoryTotals();
 
        const prompt = `You are a helpful personal finance assistant inside a finance tracker app. My balance is ₹${balance}, total income ₹${income}, total expenses ₹${expense}. My spending by category: ${JSON.stringify(catTotals)}. Answer my question briefly and practically, no markdown formatting: "${question}"`;
 
        try {
            const reply = await askAI(prompt);
            loadingMsg.textContent = reply;
        } catch (err) {
            loadingMsg.textContent = "Sorry, something went wrong. Please try again.";
        }
 
        chatInput.disabled = false;
        chatInput.focus();
    });
</script>
</body>
</html>
