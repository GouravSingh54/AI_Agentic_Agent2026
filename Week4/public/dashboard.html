<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Ledger</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
 
<header class="topbar">
    <div class="brand"><span class="mark">₹</span> Ledger</div>
    <button class="nav-toggle" aria-label="Toggle menu">☰</button>
    <nav class="navlinks">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="add-transaction.html">Add Transaction</a>
        <a href="history.html">History</a>
        <a href="reports.html">Reports</a>
        <a href="assistant.html">AI Assistant</a>
        <a href="settings.html">Settings</a>
    </nav>
</header>
 
<main>
    <span class="eyebrow">Overview</span>
    <h1 class="page-title">Dashboard</h1>
    <p class="page-sub">Your current balance and the latest entries in the ledger.</p>
 
    <div class="stat-row">
        <div class="stat-card">
            <span class="stat-label">Balance</span>
            <span class="stat-value mono" id="statBalance">₹0</span>
        </div>
        <div class="stat-card income">
            <span class="stat-label">Total Income</span>
            <span class="stat-value mono" id="statIncome">₹0</span>
        </div>
        <div class="stat-card expense">
            <span class="stat-label">Total Expenses</span>
            <span class="stat-value mono" id="statExpense">₹0</span>
        </div>
    </div>
 
    <div class="ledger">
        <div class="ledger-header">
            <h2>Recent Transactions</h2>
            <a href="history.html" class="btn btn-ghost" style="padding:8px 16px;font-size:0.82rem;">View all →</a>
        </div>
        <div id="recentList"></div>
    </div>
</main>
 
<footer>Ledger · Finance Tracker</footer>
 
<script src="js/storage.js"></script>
<script src="js/nav.js"></script>
<script>
    function renderDashboard() {
        document.getElementById("statBalance").textContent = formatMoney(getBalance());
        document.getElementById("statIncome").textContent = formatMoney(getTotalIncome());
        document.getElementById("statExpense").textContent = formatMoney(getTotalExpenses());
 
        const recent = getTransactions()
            .sort((a, b) => new Date(b.date) - new Date(a.date))
            .slice(0, 6);
 
        const list = document.getElementById("recentList");
 
        if (recent.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <span class="glyph">📖</span>
                    <p>No entries yet. <a href="add-transaction.html" style="color:var(--gold);font-weight:600;">Add your first transaction</a>.</p>
                </div>`;
            return;
        }
 
        list.innerHTML = recent.map(function (t) {
            const isIncome = t.type === "income";
            return `
                <div class="entry">
                    <span class="date">${formatDate(t.date)}</span>
                    <span>
                        <span class="desc">${escapeHtml(t.description)}</span>
                        <span class="cat">${escapeHtml(t.category)}</span>
                    </span>
                    <span class="stamp ${isIncome ? "cr" : "dr"}">${isIncome ? "CR" : "DR"}</span>
                    <span class="amount ${isIncome ? "income" : "expense"} mono">${isIncome ? "+" : "−"}${formatMoney(t.amount)}</span>
                </div>`;
        }).join("");
    }
 
    function formatDate(dateStr) {
        const d = new Date(dateStr);
        if (isNaN(d)) return dateStr;
        return d.toLocaleDateString("en-IN", { day: "2-digit", month: "short" });
    }
 
    function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
    }
 
    renderDashboard();
</script>
</body>
</html>
